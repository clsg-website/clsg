<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLSG Season 8 — Team Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0c10; --surface: #111418; --card: #181c22; --border: #252a33;
  --accent: #4f9eff; --accent2: #ff4f6d; --accent3: #b36eff;
  --text: #e8eaf0; --muted: #6b7280;
  --tag-ite: #fbbf24; --tag-jc: #34d399; --tag-poly: #60a5fa; --tag-uni: #c084fc;
  --qual: #fb923c; --direct: #4ade80;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before {
  content:''; position:fixed; inset:0; z-index:0;
  background-image: linear-gradient(rgba(79,158,255,.03) 1px,transparent 1px), linear-gradient(90deg,rgba(79,158,255,.03) 1px,transparent 1px);
  background-size:40px 40px; pointer-events:none;
}

/* Header */
header { position:relative; z-index:10; padding:40px 24px 20px; text-align:center; border-bottom:1px solid var(--border); }
.logo-row { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:10px; }
.logo-diamond { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),var(--accent3)); transform:rotate(45deg); border-radius:4px; }
h1 { font-size:clamp(1.5rem,5vw,2.4rem); font-weight:800; letter-spacing:-0.02em; }
h1 span { color:var(--accent); }
.subtitle { color:var(--muted); font-size:.82rem; margin-top:5px; font-family:'DM Mono',monospace; letter-spacing:.04em; }

/* Nav */
.nav-tabs { display:flex; justify-content:center; margin:20px auto 0; background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; width:fit-content; max-width:90vw; }
.nav-tab { padding:10px 28px; cursor:pointer; font-size:.88rem; font-weight:700; letter-spacing:.04em; color:var(--muted); border:none; background:none; font-family:'Syne',sans-serif; transition:all .2s; }
.nav-tab:hover { color:var(--text); }
.nav-tab.active { background:var(--card); color:var(--text); box-shadow:inset 0 0 0 1px var(--border); border-bottom:2px solid var(--accent); }

/* Game tabs */
.game-tabs { display:flex; justify-content:center; gap:8px; margin:18px auto 0; padding:0 20px; position:relative; z-index:10; }
.game-tab { padding:7px 22px; cursor:pointer; font-size:.82rem; font-weight:700; letter-spacing:.05em; color:var(--muted); border:1.5px solid var(--border); border-radius:8px; background:var(--surface); transition:all .2s; font-family:'Syne',sans-serif; }
.game-tab.active.mlbb { color:var(--accent);  border-color:var(--accent);  background:rgba(79,158,255,.08); }
.game-tab.active.valo { color:var(--accent2); border-color:var(--accent2); background:rgba(255,79,109,.08); }

/* Search / filters */
.search-wrap { position:relative; z-index:10; max-width:540px; margin:18px auto 0; padding:0 20px; }
.search-icon { position:absolute; left:36px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
#search { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px 12px 42px; color:var(--text); font-size:.92rem; font-family:'Syne',sans-serif; outline:none; transition:border-color .2s,box-shadow .2s; }
#search:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,158,255,.12); }
#search::placeholder { color:var(--muted); }
.filters { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:680px; margin:12px auto 0; padding:0 20px; position:relative; z-index:10; }
.chip { padding:4px 13px; border-radius:999px; font-size:.74rem; font-weight:700; letter-spacing:.04em; cursor:pointer; border:1.5px solid var(--border); background:var(--surface); color:var(--muted); transition:all .15s; font-family:'Syne',sans-serif; }
.chip.active { color:#000; border-color:transparent; }
.chip[data-filter="all"].active { background:var(--text); }
.chip[data-filter="Institute of Technical Education"].active { background:var(--tag-ite); }
.chip[data-filter="Junior College"].active { background:var(--tag-jc); }
.chip[data-filter="Polytechnic"].active    { background:var(--tag-poly); }
.chip[data-filter="University"].active     { background:var(--tag-uni); }
.results-meta { text-align:center; font-family:'DM Mono',monospace; font-size:.74rem; color:var(--muted); margin:14px 0 2px; position:relative; z-index:10; }

/* Team grid */
main { position:relative; z-index:10; max-width:1100px; margin:0 auto; padding:14px 20px 80px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(285px,1fr)); gap:14px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:transform .2s,box-shadow .2s,border-color .2s; animation:fadeUp .25s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.card.mlbb:hover { transform:translateY(-3px); border-color:rgba(79,158,255,.4); box-shadow:0 8px 32px rgba(0,0,0,.4); }
.card.valo:hover { transform:translateY(-3px); border-color:rgba(255,79,109,.4); box-shadow:0 8px 32px rgba(0,0,0,.4); }
.card.sf6:hover  { transform:translateY(-3px); border-color:rgba(179,110,255,.4); box-shadow:0 8px 32px rgba(0,0,0,.4); }
.card-header { padding:13px 15px 11px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.team-name { font-size:.96rem; font-weight:800; line-height:1.2; word-break:break-word; }
.card.mlbb .team-name { color:var(--accent); }
.card.valo .team-name { color:var(--accent2); }
.card.sf6  .team-name { color:var(--accent3); }
.school-tag { font-size:.67rem; font-weight:700; letter-spacing:.06em; padding:3px 7px; border-radius:5px; white-space:nowrap; flex-shrink:0; margin-top:1px; }
.school-tag.ite   { background:rgba(251,191,36,.15);  color:var(--tag-ite); }
.school-tag.jc    { background:rgba(52,211,153,.15);  color:var(--tag-jc); }
.school-tag.poly  { background:rgba(96,165,250,.15);  color:var(--tag-poly); }
.school-tag.uni   { background:rgba(192,132,252,.15); color:var(--tag-uni); }
.school-tag.other { background:rgba(148,163,184,.15); color:#94a3b8; }
.school-name { font-size:.75rem; color:var(--muted); margin-top:3px; font-family:'DM Mono',monospace; }
.status-badge { display:inline-flex; align-items:center; gap:5px; font-size:.67rem; font-weight:700; letter-spacing:.05em; padding:3px 8px; border-radius:5px; margin-top:6px; }
.status-badge.qualifier { background:rgba(251,146,60,.1); color:var(--qual);   border:1px solid rgba(251,146,60,.2); }
.status-badge.direct    { background:rgba(74,222,128,.1); color:var(--direct); border:1px solid rgba(74,222,128,.2); }
.status-badge::before   { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; display:inline-block; }
.players { padding:10px 15px 13px; display:flex; flex-direction:column; gap:7px; }
.player-row { display:flex; align-items:center; gap:0; }
.player-role { font-size:.62rem; font-weight:700; letter-spacing:.06em; color:var(--muted); width:54px; flex-shrink:0; font-family:'DM Mono',monospace; text-transform:uppercase; }
.player-role.leader { color:#fbbf24; }
.player-info { display:flex; flex-direction:column; gap:1px; flex:1; min-width:0; }
.player-ign     { font-size:.84rem; font-family:'DM Mono',monospace; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.player-discord { font-size:.7rem;  font-family:'DM Mono',monospace; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.player-discord::before { content:'# '; opacity:.5; }
.empty { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); }
.empty-icon { font-size:3rem; margin-bottom:12px; }
.empty p { font-size:.85rem; margin-top:6px; }

/* Brackets */
#brackets-view { display:none; }
.brackets-wrap { position:relative; z-index:10; max-width:1300px; margin:0 auto; padding:16px 20px 80px; }
.bracket-section { margin-bottom:36px; animation:fadeUp .3s ease both; }
.bracket-school-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.bracket-school-header h3 { font-size:.98rem; font-weight:800; }
.team-count { font-size:.7rem; font-family:'DM Mono',monospace; color:var(--muted); background:var(--surface); border:1px solid var(--border); padding:2px 8px; border-radius:5px; }
.bracket-scroll { overflow-x:auto; padding-bottom:6px; }
.bracket-scroll::-webkit-scrollbar { height:3px; }
.bracket-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.bracket-rounds { display:flex; align-items:flex-start; min-width:max-content; }
.bracket-round { display:flex; flex-direction:column; }
.round-label { font-size:.66rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; text-align:center; padding:5px 12px; margin-bottom:8px; border-radius:5px; font-family:'DM Mono',monospace; }
.mlbb-bracket .round-label { color:var(--accent);  background:rgba(79,158,255,.08); }
.valo-bracket .round-label { color:var(--accent2); background:rgba(255,79,109,.08); }
.round-matches { display:flex; flex-direction:column; }
.match-wrapper { display:flex; align-items:center; }
.match { width:180px; flex-shrink:0; border:1px solid var(--border); border-radius:9px; overflow:hidden; background:var(--card); }
.match-team { display:flex; align-items:center; padding:7px 10px; font-size:.78rem; font-family:'DM Mono',monospace; border-bottom:1px solid var(--border); min-height:32px; }
.match-team:last-child { border-bottom:none; }
.match-team.bye { color:var(--muted); font-style:italic; }
.match-team.tbd { color:var(--muted); }
.match-team-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.connector { display:flex; flex-direction:column; width:20px; flex-shrink:0; align-self:stretch; }
.connector-top    { flex:1; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
.connector-bottom { flex:1; border-right:1px solid var(--border); border-top:1px solid var(--border); }
.round-gap { width:20px; flex-shrink:0; }
.winner-box { display:flex; align-items:center; justify-content:center; width:68px; height:64px; border:1px solid rgba(255,215,0,.25); border-radius:9px; background:rgba(255,215,0,.05); font-size:.78rem; font-weight:700; color:#fbbf24; flex-shrink:0; text-align:center; line-height:1.4; }
.match-spacer { height:8px; }

@media (max-width:480px) {
  .grid { grid-template-columns:1fr; }
  .match { width:150px; }
  .nav-tab { padding:10px 18px; font-size:.82rem; }
}
</style>
</head>

let activeView='teams', activeGame='mlbb', activeBGame='mlbb', activeFilter='all', searchQuery='';

function typeClass(t) {
  if(t==='Institute of Technical Education') return 'ite';
  if(t==='Junior College') return 'jc';
  if(t==='Polytechnic')    return 'poly';
  if(t==='University')     return 'uni';
  return 'other';
}
function typeLabel(t) {
  if(t==='Institute of Technical Education') return 'ITE';
  if(t==='Junior College') return 'JC';
  if(t==='Polytechnic')    return 'POLY';
  if(t==='University')     return 'UNI';
  return t.substring(0,4).toUpperCase();
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function normalize(s) { return String(s).toLowerCase().replace(/[^a-z0-9 ]/g,''); }

// ── Team cards ────────────────────────────────────────────────────────────────
function buildTeamCard(team, game) {
  const tc = typeClass(team.school_type);
  const isDirect = team.status === 'Direct to Playoffs';
  const ph = team.players.map(p => {
    const isL = p.role === 'Team Leader';
    return `<div class="player-row">
      <span class="player-role${isL?' leader':''}">${isL?'LEADER':p.role.replace('Player ','P')}</span>
      <div class="player-info">
        <span class="player-ign">${esc(p.ign||'—')}</span>
        ${p.discord ? `<span class="player-discord">${esc(p.discord)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
  return `<div class="card ${game}">
    <div class="card-header">
      <div>
        <div class="team-name">${esc(team.team)}</div>
        <div class="school-name">${esc(team.school)}</div>
        <span class="status-badge ${isDirect?'direct':'qualifier'}">${isDirect?'Direct to Playoffs':'Qualifier'}</span>
      </div>
      <span class="school-tag ${tc}">${typeLabel(team.school_type)}</span>
    </div>
    <div class="players">${ph}</div>
  </div>`;
}

function buildSf6Card(p) {
  const tc = typeClass(p.school_type);
  return `<div class="card sf6">
    <div class="card-header">
      <div>
        <div class="team-name">${esc(p.ign||'—')}</div>
        <div class="school-name">${esc(p.school)}</div>
      </div>
      <span class="school-tag ${tc}">${typeLabel(p.school_type)}</span>
    </div>
    ${p.discord ? `<div class="players"><div class="player-row">
      <span class="player-role">IGN</span>
      <div class="player-info">
        <span class="player-ign">${esc(p.ign)}</span>
        <span class="player-discord">${esc(p.discord)}</span>
      </div>
    </div></div>` : ''}
  </div>`;
}

function itemMatches(item, q) {
  const parts = [item.team||item.ign||'', item.school,
    ...(item.players||[]).flatMap(p=>[p.ign||'', p.discord||''])];
  if (item.discord) parts.push(item.discord);
  const hay = normalize(parts.join(' '));
  return q.trim().split(/\s+/).every(w => hay.includes(normalize(w)));
}

function renderTeams() {
  const grid = document.getElementById('grid'), q = searchQuery.trim();
  let items, cardFn;
  if(activeGame==='mlbb')      { items=DATA.mlbb; cardFn=t=>buildTeamCard(t,'mlbb'); }
  else if(activeGame==='valo') { items=DATA.valo; cardFn=t=>buildTeamCard(t,'valo'); }
  else                         { items=DATA.sf6;  cardFn=buildSf6Card; }
  const f = items.filter(i=>(activeFilter==='all'||i.school_type===activeFilter)&&(!q||itemMatches(i,q)));
  const noun = activeGame==='sf6'?'player':'team';
  document.getElementById('results-meta').textContent = f.length===0?'No results':`${f.length} ${noun}${f.length!==1?'s':''}`;
  grid.innerHTML = f.length===0
    ? `<div class="empty"><div class="empty-icon">🔍</div><h3>No results found</h3><p>Try a different name, IGN, Discord or school</p></div>`
    : f.map(cardFn).join('');
}

// ── Brackets ──────────────────────────────────────────────────────────────────
function renderBrackets() {
  const wrap = document.getElementById('brackets-content');
  const gameData = BRACKETS[activeBGame];
  const ac = activeBGame+'-bracket';
  let html = '';
  for (const [school, data] of Object.entries(gameData)) {
    const nR = data.rounds.length;
    let rh = '';
    for (let ri=0; ri<nR; ri++) {
      const round = data.rounds[ri], isLast = ri===nR-1;
      let mh = '';
      for (let mi=0; mi<round.matches.length; mi++) {
        const m = round.matches[mi];
        const lA = m.a ? esc(m.a) : (ri===0?'BYE':'TBD');
        const lB = m.b ? esc(m.b) : (ri===0?'BYE':'TBD');
        const cA = !m.a ? (ri===0?'bye':'tbd') : '';
        const cB = !m.b ? (ri===0?'bye':'tbd') : '';
        mh += `<div class="match-wrapper">
          <div class="match">
            <div class="match-team ${cA}"><span class="match-team-name">${lA}</span></div>
            <div class="match-team ${cB}"><span class="match-team-name">${lB}</span></div>
          </div>
          ${!isLast?'<div class="connector"><div class="connector-top"></div><div class="connector-bottom"></div></div>':''}
        </div>${mi<round.matches.length-1?'<div class="match-spacer"></div>':''}`;
      }
      rh += `<div class="bracket-round">
          <div class="round-label">${esc(round.label)}</div>
          <div class="round-matches">${mh}</div>
        </div>
        ${!isLast?'<div class="round-gap"></div>':''}
        ${isLast?'<div style="display:flex;align-items:center;padding-left:20px"><div class="winner-box">🏆<br>Winner</div></div>':''}`;
    }
    html += `<div class="bracket-section ${ac}">
      <div class="bracket-school-header"><h3>${esc(school)}</h3><span class="team-count">${data.teams.length} teams</span></div>
      <div class="bracket-scroll"><div class="bracket-rounds">${rh}</div></div>
    </div>`;
  }
  wrap.innerHTML = html;
}

// ── View switching ────────────────────────────────────────────────────────────
function setView(v) {
  activeView = v;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('teams-controls').style.display = v==='teams'?'':'none';
  document.getElementById('teams-view').style.display     = v==='teams'?'':'none';
  document.getElementById('brackets-view').style.display  = v==='brackets'?'block':'none';
  if(v==='brackets') renderBrackets();
}
document.querySelectorAll('.nav-tab').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view)));

document.querySelectorAll('#team-game-tabs .game-tab').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#team-game-tabs .game-tab').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); activeGame=b.dataset.game; searchQuery=''; activeFilter='all';
  document.getElementById('search').value='';
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.filter==='all'));
  document.querySelector('.chip[data-filter="Junior College"]').style.display=activeGame==='sf6'?'none':'';
  renderTeams();
}));

document.querySelectorAll('[data-bgame]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-bgame]').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); activeBGame=b.dataset.bgame; renderBrackets();
}));

document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active'); activeFilter=c.dataset.filter; renderTeams();
}));

let st;
document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(st); st=setTimeout(()=>{searchQuery=e.target.value;renderTeams();},120);
});

renderTeams();
